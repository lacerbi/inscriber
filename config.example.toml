# inscriber example configuration.
#
# How to use this file:
# 1. Fill in the local paths marked REQUIRED below.
# 2. Put the completed values in a file named config.toml in the project root,
#    or pass this file explicitly with: inscriber --config config.example.toml ...
# 3. Leave options you do not need at their defaults.
#
# Shortcut: `inscriber setup` downloads the recommended models and writes the
# model paths into the platform config.toml for you (see README.md); this file
# is the full reference for everything else.
#
# Path notes:
# - Use absolute paths for llama.cpp and GGUF files.
# - On Windows, forward slashes are accepted, for example:
#   C:/Users/you/models/deepseek-ocr-bf16.gguf
# - inscriber bundles no model weights; these files must already exist locally.

[llama]
# REQUIRED unless you use endpoints below: folder containing llama-server.exe
# on Windows, or llama-server on Linux/macOS.
bin_dir = "C:/path/to/llama.cpp/build/bin"

# Usually leave these as-is. port = 0 means inscriber picks a free port.
# ctx_size is the single size knob (prompt + generation share it); 16384 leaves
# room for the table-restructuring pass (page image + page text + OCR table
# prompt, plus the VLM's thinking + answer). llama.cpp builds >= 9587 cap each
# slot at the model's training context (8192 for DeepSeek-OCR) with a log line;
# that is harmless — the VLM is what needs the headroom.
host = "127.0.0.1"
port = 0
server_start_timeout = 120
ctx_size = 16384

[inference]
# sequential keeps one model resident at a time and is the safest default.
# concurrent starts OCR and VLM servers together and needs enough RAM/VRAM.
mode = "sequential"

[ocr]
backend = "deepseek-ocr"

# REQUIRED unless ocr.endpoint is set: DeepSeek-OCR model + multimodal projector
# (download links in README.md, or let `inscriber setup` fetch them). BF16
# recommended; Q8_0 also verified working.
# Avoid Q4_K_M for DeepSeek-OCR — it causes runaway repetition loops.
model = "C:/path/to/models/deepseek-ocr-bf16.gguf"
mmproj = "C:/path/to/models/mmproj-deepseek-ocr-bf16.gguf"

# tiny | small | base | large | gundam
# gundam (default) renders 2048 px — the model's larger saturated encoding,
# which eliminates its systematic small-subscript misreads at ~20% extra time.
# large (1280 px) is the faster fallback for simple documents.
resolution = "gundam"

# auto lets llama.cpp choose GPU offload. Use 0 for CPU, "all" for all layers,
# or an explicit integer layer count.
n_gpu_layers = "auto"

# Optional: if you already run a compatible llama-server yourself, set this and
# inscriber will not launch its own OCR server or validate model/mmproj paths.
endpoint = ""

[vlm]
backend = "gemma"

# REQUIRED unless vlm.endpoint is set: Gemma text model + multimodal projector
# (download links in README.md; "mmproj-BF16.gguf" is unsloth's verbatim
# filename — `inscriber setup` saves it under a Gemma-specific name instead).
model = "C:/path/to/models/gemma-4-E4B-it-qat-UD-Q4_K_XL.gguf"
mmproj = "C:/path/to/models/mmproj-BF16.gguf"

n_gpu_layers = "auto"

# Optional: use an already-running compatible llama-server for figure descriptions.
endpoint = ""

[figure]
# auto uses DeepSeek-OCR grounding. Other values:
# grounding | none | pdf-embedded
detect = "auto"

# describe-only writes text descriptions only.
# describe-and-keep also writes image links to cropped figures.
# placeholder inserts a non-displayed image placeholder.
mode = "describe-only"

# Extra margin around detected figure boxes, as a fraction of page dimensions.
crop_padding = 0.02

# Whole-page context chars sent to the VLM for each figure.
context_chars = 2000

[table]
# Restructure DeepSeek-OCR's degenerate <table> HTML into clean Markdown pipe
# tables using the VLM and a cropped image of the table (the full page image
# when no table box was detected). Independent of figure settings.
# Generation is bounded by llama.ctx_size (Gemma 4 thinks before answering;
# complex tables need ~6-8k tokens of thinking + answer).
refine = true

[output]
# Output directory for generated Markdown, bundle files, and optional figures.
dir = "."

# Output base name: files are written as {base}_full.md, {base}_main.md,
# {base}_appendix.md, {base}_backmatter.md, and {base}.bib.
# An explicit base name is a per-run value, so it is CLI-only: --name NAME
# (with the `ocr` subcommand it also names the bundle directory).
# name_from_bibtex = when no explicit --name is given and a BibTeX entry was
#        produced, use its citation key (e.g. chang2025amortized) as the base
#        name; otherwise fall back to the source-derived name (PDF stem or
#        repository filename). The chosen name is logged on every run.
name_from_bibtex = true

# false writes the full document as {base}.md instead of {base}_full.md
# (library-style one-file naming; the split files keep their suffixes).
full_suffix = true

split = true
page_numbers = false
page_separators = false
normalize_line_breaks = true
clean = true
clobber = true

# Append a compact OCR/VLM caveat footer to generated Markdown files.
notice = true

[cache]
# enabled = false is equivalent to --no-cache: no cache reads or writes.
enabled = true

# refresh = true recomputes and overwrites existing cache entries.
refresh = false

[workdir]
# Empty means use the OS temp directory. Set a path to control intermediates.
path = ""

# true keeps page images and crop intermediates after a successful run.
keep_intermediates = false

[bibtex]
# auto — (default) decide whether the document is citable (source-URL
#        provenance, else a local VLM probe of the front matter), then walk
#        the source chain: Semantic Scholar by arXiv ID (prefers the published
#        version) -> arXiv export API -> S2 title search -> local best-effort
#        entry. Online lookups send only the extracted title / arXiv ID — the
#        document itself never leaves the machine. Under --offline only the
#        local probe + best-effort entry run.
# on   — always look the paper up via Semantic Scholar title search (needs
#        network; the --bibtex flag is an alias for this mode).
# off  — no BibTeX.
mode = "auto"

# When an entry is produced, prepend the BibTeX block into the generated
# Markdown too.
append_to_document = false

[net]
# true disables URL downloads and the online BibTeX sources (the local BibTeX
# probe and best-effort entry still run — they never touch the network).
offline = false
